name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.0.0+0.6.0-pre.6)'
        type: string
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "ref=refs/tags/$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "name=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Parse version from tag
        id: version
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          # Tag format: v<plugin-version>+<server-version>
          VERSION="${TAG_NAME#v}"
          PLUGIN_VERSION="${VERSION%%+*}"
          SERVER_VERSION="${VERSION#*+}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "server_version=$SERVER_VERSION" >> "$GITHUB_OUTPUT"

          # Pre-release if plugin version (before +) contains a hyphen
          if [[ "$PLUGIN_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SERVER_VERSION: ${{ steps.version.outputs.server_version }}
        run: |
          ./mvnw -B package \
            "-Drevision=$VERSION" \
            "-Dhytale.server.version=$SERVER_VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG \
            target/AtlasAudit-*.jar
